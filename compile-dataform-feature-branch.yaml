steps:
  - id: compile-dataform
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -e

        ACCESS_TOKEN=$(gcloud auth print-access-token)

        RESULT=$(curl -s -X POST \
          "https://dataform.googleapis.com/v1beta1/projects/${_GCP_PROJECT_ID}/locations/${_DATAFORM_REGION}/repositories/${_DATAFORM_REPO_NAME}/compilationResults" \
          -H "Authorization: Bearer $${ACCESS_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "{\"gitCommitish\": \"${_GIT_COMMITISH}\"}")

        echo "API response: $${RESULT}"

        COMPILATION_RESULT_NAME=$(echo "$${RESULT}" | python3 -c "import sys,json; print(json.load(sys.stdin)['name'])")

        echo "Compilation result: $${COMPILATION_RESULT_NAME}"

substitutions:
  _GCP_PROJECT_ID: gb-poc-373711
  _DATAFORM_REGION: europe-west1
  _DATAFORM_REPO_NAME: world-cup-qatar-elt-dataform
  _GIT_COMMITISH: main
