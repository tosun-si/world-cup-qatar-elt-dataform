steps:
  - name: gcr.io/google.com/cloudsdktool/google-cloud-cli:stable
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        ./scripts/deploy_dag_config.sh \
        && ./scripts/deploy_dag_folder.sh
    env:
      - 'PROJECT_ID=$PROJECT_ID'
      - 'LOCATION=$LOCATION'
      - 'DAG_ROOT_FOLDER=$_DAG_ROOT_FOLDER'
      - 'COMPOSER_ENVIRONMENT=$_COMPOSER_ENVIRONMENT'
      - 'CONFIG_FOLDER_NAME=$_CONFIG_FOLDER_NAME'
      - 'ENV=$_ENV'
